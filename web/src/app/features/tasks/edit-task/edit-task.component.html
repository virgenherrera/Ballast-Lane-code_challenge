<div class="mx-auto max-w-xl px-4 py-10 md:max-w-2xl md:py-16">
  @if (isLoading()) {
    <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm sm:p-8">
      <p class="text-sm text-gray-500">Loading...</p>
    </div>
  } @else if (notFound()) {
    <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm sm:p-8">
      <p data-testid="task-not-found" class="text-sm text-gray-500">Task not found.</p>
      <a routerLink="/tasks" class="mt-4 inline-flex items-center gap-1 text-sm text-blue-600 hover:text-blue-700">
        ← Back to list
      </a>
    </div>
  } @else {
    <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm sm:p-8">
      <h1 class="mb-6 text-xl font-semibold text-gray-900 md:text-2xl">Edit Task</h1>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <app-form-field
          label="Title"
          fieldId="title"
          [errorMessage]="
            fieldErrors()['title'] ||
            (form.controls.title.touched && form.controls.title.hasError('required')
              ? 'Title is required'
              : null) ||
            (form.controls.title.touched && form.controls.title.hasError('notBlank')
              ? 'Title cannot be blank'
              : null) ||
            (form.controls.title.touched && form.controls.title.hasError('maxlength')
              ? 'Title must not exceed ' + titleMaxLength + ' characters'
              : null)
          "
        >
          <input
            id="title"
            type="text"
            formControlName="title"
            class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
            placeholder="e.g. Buy groceries"
          />
        </app-form-field>

        <app-form-field
          label="Description"
          fieldId="description"
          [errorMessage]="
            fieldErrors()['description'] ||
            (form.controls.description.touched && form.controls.description.hasError('maxlength')
              ? 'Description must not exceed ' + descriptionMaxLength + ' characters'
              : null)
          "
        >
          <textarea
            id="description"
            rows="4"
            formControlName="description"
            class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
            placeholder="Add more details (optional)"
          ></textarea>
        </app-form-field>

        <app-form-field label="Due date" fieldId="dueDate" [errorMessage]="fieldErrors()['dueDate']">
          <input
            id="dueDate"
            type="datetime-local"
            formControlName="dueDate"
            class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          />
        </app-form-field>

        <app-form-field
          label="Status"
          fieldId="status"
          [errorMessage]="
            fieldErrors()['status'] ||
            (form.controls.status.touched && form.controls.status.hasError('required')
              ? 'Status is required'
              : null)
          "
        >
          <select
            formControlName="status"
            id="status"
            class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          >
            @for (s of taskStatuses; track s) {
              <option [value]="s">{{ s }}</option>
            }
          </select>
        </app-form-field>

        <button
          type="submit"
          [disabled]="form.invalid || isSubmitting()"
          class="mt-2 inline-flex w-full items-center justify-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition-colors hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-300"
        >
          @if (isSubmitting()) {
            <span>Saving...</span>
          } @else {
            <span>Save Changes</span>
          }
        </button>

        <a
          [routerLink]="['/tasks', taskId()]"
          class="mt-4 block text-center text-sm text-gray-500 hover:text-gray-700"
        >
          Cancel
        </a>
      </form>
    </div>
  }
</div>
