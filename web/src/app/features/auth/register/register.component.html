<div class="mx-auto max-w-xl px-4 py-10">
  <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm sm:p-8">
    <h1 class="mb-6 text-xl font-semibold text-gray-900">Create an account</h1>

    @if (submitSucceeded()) {
      <div class="mb-6 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700">
        Account created! Redirecting to login...
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <app-form-field
        label="Email"
        fieldId="email"
        [errorMessage]="
          (form.controls.email.touched && form.controls.email.hasError('required')
            ? 'Email is required'
            : null) ||
          (form.controls.email.touched && form.controls.email.hasError('email')
            ? 'Enter a valid email'
            : null) ||
          fieldErrors()['email'] ||
          null
        "
      >
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="you@example.com"
        />
      </app-form-field>

      <app-form-field
        label="Name"
        fieldId="name"
        [errorMessage]="
          (form.controls.name.touched && form.controls.name.hasError('required')
            ? 'Name is required'
            : null) ||
          (form.controls.name.touched && form.controls.name.hasError('notBlank')
            ? 'Name cannot be blank'
            : null) ||
          (form.controls.name.touched && form.controls.name.hasError('maxlength')
            ? 'Name must be 100 characters or fewer'
            : null) ||
          fieldErrors()['name'] ||
          null
        "
      >
        <input
          id="name"
          type="text"
          formControlName="name"
          autocomplete="name"
          class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="Jane Doe"
        />
      </app-form-field>

      <app-form-field
        label="Password"
        fieldId="password"
        [errorMessage]="
          (form.controls.password.touched && form.controls.password.hasError('required')
            ? 'Password is required'
            : null) ||
          (form.controls.password.touched && form.controls.password.hasError('minlength')
            ? 'Password must be at least 8 characters'
            : null) ||
          fieldErrors()['password'] ||
          null
        "
      >
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="••••••••"
        />
      </app-form-field>

      <button
        type="submit"
        [disabled]="form.invalid || isLoading()"
        class="mt-2 inline-flex w-full items-center justify-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition-colors hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-300"
      >
        @if (isLoading()) {
          <span>Creating...</span>
        } @else {
          <span>Create Account</span>
        }
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-500">
      Already have an account?
      <a routerLink="/login" class="font-medium text-blue-600 hover:text-blue-700">Log in</a>
    </p>
  </div>
</div>
