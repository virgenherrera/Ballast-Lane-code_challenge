<div class="mx-auto max-w-xl px-4 py-10 md:max-w-lg md:py-16 lg:py-24">
  <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm sm:p-8">
    <h1 class="mb-6 text-xl font-semibold text-gray-900 md:text-2xl">Log in</h1>

    @if (justRegistered()) {
      <div class="mb-6 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700">
        Account created successfully. Please log in.
      </div>
    }

    @if (loginFailed()) {
      <div class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        Invalid credentials
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <app-form-field
        label="Email"
        fieldId="email"
        [errorMessage]="
          (form.controls.email.touched && form.controls.email.hasError('required')
            ? 'Email is required'
            : null) ||
          (form.controls.email.touched && form.controls.email.hasError('email')
            ? 'Enter a valid email'
            : null)
        "
      >
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="you@example.com"
        />
      </app-form-field>

      <app-form-field
        label="Password"
        fieldId="password"
        [errorMessage]="
          form.controls.password.touched && form.controls.password.hasError('required')
            ? 'Password is required'
            : null
        "
      >
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          class="block w-full rounded-lg border border-gray-300 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="••••••••"
        />
      </app-form-field>

      <button
        type="submit"
        [disabled]="form.invalid || isLoading()"
        class="mt-2 inline-flex w-full items-center justify-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition-colors hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-300"
      >
        @if (isLoading()) {
          <span>Logging in...</span>
        } @else {
          <span>Log in</span>
        }
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-500">
      Don't have an account?
      <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-700">Create an account</a>
    </p>
  </div>
</div>
